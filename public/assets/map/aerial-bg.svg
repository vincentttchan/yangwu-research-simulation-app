<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#304143" stroke-width="0.4" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- 經緯網格 -->
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- 主要緯線（粗一點點） -->
  <g stroke="#304143" stroke-width="0.6" fill="none" opacity="0.25">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
  </g>

  <!-- 緯度標籤 -->
  <g fill="#304143" opacity="0.4" font-family="Cormorant Garamond, serif" font-size="11" font-style="italic" font-weight="300">
    <text x="20" y="195">45°N</text>
    <text x="20" y="395">35°N</text>
    <text x="20" y="595">25°N</text>
    <text x="20" y="795">15°N</text>
  </g>

  <!-- 東亞海岸線（簡化、藝術化） -->
  <g fill="none" stroke="#304143" stroke-width="1.1" opacity="0.55" stroke-linecap="round" stroke-linejoin="round">
    <!-- 中國東岸：從黑龍江到海南 -->
    <path d="M 180 80 Q 220 140 270 180 Q 310 220 290 270 Q 280 310 310 340 Q 360 360 380 410 Q 390 460 370 500 Q 360 540 390 570 Q 420 600 430 650 Q 440 700 480 740 Q 510 780 520 820 Q 510 860 480 880"/>
    <!-- 渤海內凹 -->
    <path d="M 270 240 Q 310 250 330 280 Q 320 310 290 290"/>
    <!-- 朝鮮半島 -->
    <path d="M 670 240 Q 695 280 710 340 Q 705 400 725 440 Q 745 470 750 460 Q 760 420 745 380 Q 760 320 745 270 Q 720 235 690 235 Z"/>
    <!-- 日本本州 -->
    <path d="M 900 220 Q 1000 270 1100 350 Q 1180 410 1240 480 Q 1280 540 1300 600"/>
    <!-- 九州 -->
    <path d="M 940 480 Q 980 470 1010 495 Q 1020 520 990 525 Q 950 520 940 500 Z"/>
    <!-- 四國（小） -->
    <path d="M 1070 470 Q 1110 465 1130 485 Q 1115 500 1080 495 Z"/>
    <!-- 北海道（不完整、退出畫面感） -->
    <path d="M 1100 100 Q 1180 130 1260 180 Q 1300 220 1320 270"/>
    <!-- 台灣 -->
    <path d="M 565 700 Q 590 740 588 800 Q 580 830 568 805 Q 555 750 565 700 Z"/>
    <!-- 海南 -->
    <path d="M 280 875 Q 320 868 332 890 Q 320 910 280 902 Z"/>
  </g>

  <!-- 河流暗示（淡） -->
  <g fill="none" stroke="#304143" stroke-width="0.5" opacity="0.3">
    <path d="M 290 270 Q 220 290 150 330 Q 90 360 50 410"/>
    <path d="M 385 540 Q 300 530 220 555 Q 140 580 60 590"/>
  </g>

  <!-- 山脈／等高線（抽象拓樸） -->
  <g fill="none" stroke="#304143" stroke-width="0.4" opacity="0.22">
    <path d="M 80 580 Q 180 560 280 600 T 480 620 Q 580 640 680 615"/>
    <path d="M 70 620 Q 170 600 270 640 T 470 660"/>
    <path d="M 100 660 Q 200 645 300 680"/>
    <path d="M 60 720 Q 160 705 260 735 T 460 750"/>
    <path d="M 90 760 Q 190 750 290 775"/>
  </g>

  <!-- 主要城市點（極小） -->
  <g fill="#304143" opacity="0.5">
    <circle cx="295" cy="265" r="2"/>  <!-- 北京 -->
    <circle cx="320" cy="285" r="1.5"/><!-- 天津 -->
    <circle cx="385" cy="535" r="2"/>  <!-- 上海 -->
    <circle cx="395" cy="490" r="1.5"/><!-- 南京 -->
    <circle cx="475" cy="715" r="1.5"/><!-- 福州 -->
    <circle cx="520" cy="810" r="2"/>  <!-- 香港/廣州 -->
    <circle cx="345" cy="490" r="1.5"/><!-- 武漢 -->
    <circle cx="430" cy="335" r="1.5"/><!-- 威海 -->
    <circle cx="1130" cy="375" r="2"/> <!-- 東京 -->
    <circle cx="970" cy="500" r="1.5"/><!-- 長崎 -->
    <circle cx="725" cy="285" r="2"/>  <!-- 漢城 -->
  </g>

  <!-- 城市名（極小、義體） -->
  <g fill="#304143" opacity="0.35" font-family="Cormorant Garamond, serif" font-size="9" font-style="italic" font-weight="300" letter-spacing="0.1em">
    <text x="304" y="262">PEKING</text>
    <text x="395" y="532">SHANGHAI</text>
    <text x="530" y="810">CANTON</text>
    <text x="1140" y="372">EDO</text>
    <text x="735" y="282">SEOUL</text>
  </g>

  <!-- 羅盤（右上） -->
  <g transform="translate(1480 110)" stroke="#304143" fill="none" opacity="0.4">
    <circle r="26" stroke-width="0.5"/>
    <circle r="2" fill="#304143"/>
    <path d="M 0 -26 L 0 26 M -26 0 L 26 0" stroke-width="0.4"/>
    <path d="M -18 -18 L 18 18 M -18 18 L 18 -18" stroke-width="0.3" opacity="0.6"/>
    <text x="0" y="-32" text-anchor="middle" fill="#304143" font-family="Cormorant Garamond, serif" font-size="11" font-style="italic" font-weight="300">N</text>
  </g>

  <!-- 比例尺（左下） -->
  <g transform="translate(80 920)" stroke="#304143" fill="#304143" opacity="0.4">
    <line x1="0" y1="0" x2="120" y2="0" stroke-width="0.6"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke-width="0.6"/>
    <line x1="60" y1="-2" x2="60" y2="2" stroke-width="0.6"/>
    <line x1="120" y1="-3" x2="120" y2="3" stroke-width="0.6"/>
    <text x="0" y="16" font-family="Cormorant Garamond, serif" font-size="9" font-style="italic" font-weight="300">0</text>
    <text x="120" y="16" font-family="Cormorant Garamond, serif" font-size="9" font-style="italic" font-weight="300">1000 LI</text>
  </g>
</svg>
